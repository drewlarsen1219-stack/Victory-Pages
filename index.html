<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Pilgrim Pace</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pilgrim Pace — a faith-based Personal Operating System for intentional Christian living.">

<script src="assessment.js" defer></script>
<script src="pathways_system.js" defer></script>

<link rel="stylesheet" href="New_VP.CSS">
<link rel="icon" type="image/png" href="assets/favicon2.png">
<link rel="canonical" href="https://pilgrimpace.com/">
<meta property="og:title" content="Pilgrim Pace">
<meta property="og:description" content="A faith-based personal operating system for intentional Christian living. Assess your life across 13 domains and follow guided pathways toward growth.">
<meta property="og:image" content="https://pilgrimpace.com/assets/seal-9.png">
<meta property="og:url" content="https://pilgrimpace.com">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Pilgrim Pace">
<meta name="twitter:description" content="A faith-based personal operating system for intentional Christian living.">
<meta name="twitter:image" content="https://pilgrimpace.com/assets/seal-9.png">
</head>

<body>
<div class="main-layout">
<div class="sidebar-column">
  <div id="sidebar-status">
    <div id="sidebar-welcome">Welcome!</div>
    <div id="sidebar-desc">Click a section below</div>
  </div>
  <nav class="sidebar">
  <ul class="tree-view">
    <li>
      <details><summary data-desc="Hovering over any menu item will show a description here, then click to open the item.">Quick Start</summary>
        <ul>
          <li class="menu-item" data-desc="You now understand how the menu works. Next, find and click the About item in the Resources dropdown.">
            <a href="javascript:void(0)" class="link-button">Hover here</a>
          </li>
        </ul>
      </details>
    </li>

    <li>
      <details>
        <summary data-desc="Access reference materials, curated literature, and information about the site.">Resources</summary>
        <ul>
          <li class="menu-item" data-desc="Information about the site owner, the website, and how the site functions.">
            <a href="javascript:void(0)" class="link-button" onclick="showContent('about')">About</a>
          </li>
          <li class="menu-item" data-desc="Collection of curated literature.">
            <a href="javascript:void(0)" class="link-button" onclick="showContent('library')">Library</a>
          </li>
        </ul>
      </details>
    </li>

    <li>
      <details><summary data-desc="Begin a new assessment to find your starting point, or load your saved progress to continue your pathways.">Pathways</summary>
        <ul>
          <li class="menu-item" data-desc="Assessment questionnaire to determine your starting point.">
            <a href="javascript:void(0)" class="link-button" onclick="showContent('pathfinder')">New User</a>
          </li>
          <li class="menu-item" data-desc="Load your saved progress and continue your pathways.">
            <a href="javascript:void(0)" class="link-button" onclick="vpLoadExistingUser()">Existing User</a>
          </li>
        </ul>
      </details>
    </li>
  </ul>
  </nav>
</div>

<main id="display-pane" class="content-window">
  <div id="default-msg"></div>
</main>
</div>

<div id="page-seal">
  <p class="seal-label">In Via</p>
  <img src="assets/seal-9.png" alt="Pilgrim Pace">
  <p class="seal-label">Pilgrim Pace</p>
</div>
<footer>
&copy; 2026 Pilgrim Pace &bull; All rights reserved &bull; Progress saved privately &bull; <a href='pages/Navigation/privacy_policy.html'>Privacy Policy</a> &bull; <a href='pages/Navigation/terms_and_conditions.html'>Terms &amp; Conditions</a>
</footer>

<script>
  var descEl = document.getElementById('sidebar-desc');
  var defaultHTML = 'Click a section below';
  document.querySelectorAll('[data-desc]').forEach(function(item) {
    var text = item.getAttribute('data-desc');
    if (!text) return;
    item.addEventListener('mouseenter', function() {
      if (descEl) descEl.textContent = text;
      var sb = document.getElementById('sidebar-status');
      if (sb) sb.classList.add('has-desc');
    });
    item.addEventListener('mouseleave', function() {
      if (descEl) descEl.innerHTML = defaultHTML;
      var sb = document.getElementById('sidebar-status');
      if (sb) sb.classList.remove('has-desc');
    });
  });
</script>
</body>
</html>
